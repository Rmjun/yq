<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的婚礼 💒</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 50%, #f48fb1 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(244, 143, 177, 0.3);
            text-align: center;
        }
        .heart { font-size: 60px; margin-bottom: 20px; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        h1 {
            font-size: 28px;
            color: #c48b9f;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 14px;
            color: #999;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px 20px;
            margin: 15px 0;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        .btn-invite {
            background: linear-gradient(135deg, #f48fb1, #ec407a);
            color: white;
            box-shadow: 0 8px 25px rgba(236, 64, 122, 0.35);
        }
        .btn-invite:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(236, 64, 122, 0.5);
        }
        .btn-map {
            background: linear-gradient(135deg, #81d4fa, #4fc3f7);
            color: white;
            box-shadow: 0 8px 25px rgba(79, 195, 247, 0.35);
        }
        .btn-map:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(79, 195, 247, 0.5);
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #bbb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart">💒</div>
        <h1>我们的婚礼</h1>
        <p class="subtitle">请选择你想要查看的内容</p>

        <a class="btn btn-invite" href="https://e-invitation.hunliji.com/p/frontend/creation-platform/app-preview-wedding-card/dist/index.html?cardId=MTMzMDMwOTY2ZmlyZV9jbG91ZA==" target="_blank" rel="noopener">
            💌 查看邀请函
        </a>

        <a class="btn btn-map" href="https://surl.amap.com/BtADNARcUX" target="_blank" rel="noopener">
            📍 导航到婚宴地点
        </a>

        <p class="footer">扫码查看更多 💕</p>
    </div>
</body>
</html>
